<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Recorrido GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estilos_mapa.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .container {
            max-width: 1100px;
            margin: auto;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #map {
            height: 650px;
            width: 100%;
            border: 2px solid #2c3e50;
            border-top: none;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .info-panel {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            font-size: 11px;
        }

        /* COLORES POR ESTADO */
        .activo { background: #27ae60; }
        .inactivo { background: #e74c3c; }
        .detenido { background: #f1c40f; color: #000; }

        /* Tooltip dinámico */
        .tooltip-activo {
            background-color: #27ae60;
            border: 2px solid #27ae60;
            color: white;
        }
        .tooltip-inactivo {
            background-color: #e74c3c;
            border: 2px solid #e74c3c;
            color: white;
        }
        .tooltip-detenido {
            background-color: #f1c40f;
            border: 2px solid #f1c40f;
            color: black;
        }

        .leaflet-tooltip {
            border-radius: 5px;
            padding: 3px 10px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📡 Monitor de Flota Personal</h2>
        <div id="user-display">Iniciando...</div>
    </div>
    
    <div class="info-panel">
        <div><strong>👤 Usuario:</strong> <span id="lbl-usuario">---</span></div>
        <div><strong>⏰ Última Actualización:</strong> <span id="lbl-fecha">---</span></div>
        <div><strong>✅ Estado:</strong> <span class="status-pill" id="lbl-status">Esperando...</span></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([-34.60, -58.40], 15);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var polyline = L.polyline([], {
        color: '#e74c3c', 
        weight: 6, 
        opacity: 0.6
    }).addTo(map);

    let marker = null;

    const urlParams = new URLSearchParams(window.location.search);
    const usuarioIdFiltro = urlParams.get('usuario_id') || '';

    function getColorByEstado(estado) {
        switch (estado) {
            case "inactivo": return "red";
            case "detenido": return "orange";
            default: return "green";
        }
    }

    function getClassByEstado(estado) {
        switch (estado) {
            case "inactivo": return "inactivo";
            case "detenido": return "detenido";
            default: return "activo";
        }
    }

    function getTooltipClass(estado) {
        switch (estado) {
            case "inactivo": return "tooltip-inactivo";
            case "detenido": return "tooltip-detenido";
            default: return "tooltip-activo";
        }
    }

    function crearIcono(color) {
        return L.divIcon({
            html: `<div style="
                background:${color};
                width:18px;
                height:18px;
                border-radius:50%;
                border:3px solid white;
                box-shadow:0 0 6px rgba(0,0,0,0.5);
            "></div>`,
            className: ''
        });
    }

    async function actualizarMapa() {
        try {
            const response = await fetch(`obtener_recorrido.php?usuario_id=${usuarioIdFiltro}`);
            const puntos = await response.json();

            if (puntos && puntos.length > 0) {

                const latlngs = puntos.map(p => [p.lat, p.lng]);
                polyline.setLatLngs(latlngs);

                const ultimaPos = latlngs[latlngs.length - 1];
                const ultimoDato = puntos[puntos.length - 1];

                const estado = (ultimoDato.status || "").toLowerCase();

                const color = getColorByEstado(estado);

                if (!marker) {
                    marker = L.marker(ultimaPos, { icon: crearIcono(color) }).addTo(map);
                } else {
                    marker.setLatLng(ultimaPos);
                    marker.setIcon(crearIcono(color));
                }

                marker.bindTooltip(ultimoDato.usuario_id, {
                    permanent: true,
                    direction: 'top',
                    offset: [0, -10],
                    className: getTooltipClass(estado)
                }).openTooltip();

                document.getElementById('lbl-usuario').innerText = ultimoDato.usuario_id;
                document.getElementById('lbl-fecha').innerText = ultimoDato.fecha_registro;

                const statusElement = document.getElementById('lbl-status');
                statusElement.innerText = ultimoDato.status;
                statusElement.className = "status-pill " + getClassByEstado(estado);

                document.getElementById('user-display').innerText = "Viendo a: " + ultimoDato.usuario_id;

                map.panTo(ultimaPos);
            }

        } catch (error) {
            console.error("Error:", error);
            const statusElement = document.getElementById('lbl-status');
            statusElement.innerText = "ERROR";
            statusElement.style.background = "#c0392b";
        }
    }

    setInterval(actualizarMapa, 5000);
    actualizarMapa();
</script>

</body>
</html>
