<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Recorrido GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .container {
            max-width: 1100px;
            margin: auto;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #map {
            height: 650px;
            width: 100%;
            border: 2px solid #2c3e50;
            border-top: none;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .info-panel {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            background: #27ae60;
            color: white;
            text-transform: uppercase;
            font-size: 11px;
        }
        /* Estilo para la etiqueta con el nombre del usuario sobre el mapa */
        .etiqueta-usuario {
            background-color: #ffffff;
            border: 2px solid #e74c3c;
            border-radius: 5px;
            padding: 3px 10px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 13px;
        }
        /* Flechita del tooltip */
        .leaflet-tooltip-top:before {
            border-top-color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📡 Monitor de Flota Personal</h2>
        <div id="user-display" style="font-weight: bold; color: #ecf0f1;">Iniciando...</div>
    </div>
    
    <div class="info-panel">
        <div><strong>👤 Usuario:</strong> <span id="lbl-usuario">---</span></div>
        <div><strong>⏰ Última Actualización:</strong> <span id="lbl-fecha">---</span></div>
        <div><strong>✅ Estado:</strong> <span class="status-pill" id="lbl-status">Esperando...</span></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Configuración inicial del Mapa
    var map = L.map('map').setView([-34.60, -58.40], 15);
    
    // 2. Capa de mapa (OpenStreetMap)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 3. Elementos visuales: Recorrido y Marcador
    var polyline = L.polyline([], {
        color: '#e74c3c', 
        weight: 6, 
        opacity: 0.6,
        lineJoin: 'round'
    }).addTo(map);

    var marker = L.marker([0, 0]).addTo(map);

    // Leer el usuario_id de la URL para filtrar si es necesario
    const urlParams = new URLSearchParams(window.location.search);
    const usuarioIdFiltro = urlParams.get('usuario_id') || '';

    async function actualizarMapa() {
        try {
            // Llamada al backend
            const response = await fetch(`obtener_recorrido.php?usuario_id=${usuarioIdFiltro}`);
            const puntos = await response.json();

            if (puntos && puntos.length > 0) {
                // Mapear coordenadas
                const latlngs = puntos.map(p => [p.lat, p.lng]);
                
                // Dibujar línea de recorrido
                polyline.setLatLngs(latlngs);
                
                // Última posición conocida
                const ultimaPos = latlngs[latlngs.length - 1];
                const ultimoDato = puntos[puntos.length - 1];
                
                // Actualizar marcador
                marker.setLatLng(ultimaPos);

                // --- ETIQUETA DE NOMBRE SOBRE EL MARCADOR ---
                marker.bindTooltip(ultimoDato.usuario_id, {
                    permanent: true,       // Siempre visible
                    direction: 'top',      // Arriba del marcador
                    offset: [0, -10],      // Ajuste de posición
                    className: 'etiqueta-usuario' // Nuestra clase CSS
                }).openTooltip();
                
                // Actualizar textos informativos
                document.getElementById('lbl-usuario').innerText = ultimoDato.usuario_id;
                document.getElementById('lbl-fecha').innerText = ultimoDato.fecha_registro;
                document.getElementById('lbl-status').innerText = ultimoDato.status;
                document.getElementById('user-display').innerText = "Viendo a: " + ultimoDato.usuario_id;

                // Centrar suavemente
                map.panTo(ultimaPos);
            }
        } catch (error) {
            console.error("Error al sincronizar con el servidor:", error);
            document.getElementById('lbl-status').innerText = "ERROR DE RED";
            document.getElementById('lbl-status').style.background = "#c0392b";
        }
    }

    // Intervalo de actualización (5 segundos)
    setInterval(actualizarMapa, 5000);
    
    // Primera carga al abrir el navegador
    actualizarMapa();
</script>

</body>
</html>
